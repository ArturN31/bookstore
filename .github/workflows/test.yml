name: Run Tests

on:
    pull_request:
        branches: [master]

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        environment: preview

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '25'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run Jest tests
              env:
                  NEXT_PUBLIC_SUPABASE_DB_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_DB_URL }}
                  NEXT_PUBLIC_SUPABASE_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLIC_KEY }}
              run: npm test -- --watchAll=false --ci
